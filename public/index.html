<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Loup-Garou Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-md mx-auto bg-slate-800 p-6 rounded-lg shadow-xl border border-slate-700">
        <h1 class="text-2xl font-bold text-center text-red-500 mb-4">🐺 Loup-Garou</h1>

        <!-- Lobby -->
        <div id="lobby">
            <input id="username" type="text" placeholder="Pseudo" class="w-full p-2 rounded bg-slate-700 mb-2">
            <button onclick="join()" class="w-full bg-blue-600 p-2 rounded mb-4">Rejoindre</button>
            <ul id="list" class="text-sm text-slate-400 mb-4"></ul>
            <button id="start-btn" onclick="start()" class="hidden w-full bg-green-600 p-2 rounded font-bold">LANCER LA PARTIE</button>
        </div>

        <!-- Jeu -->
        <div id="game" class="hidden">
            <div id="role-box" class="p-3 bg-red-900/20 border border-red-500 rounded text-center mb-4">
                Ton rôle : <span id="my-role" class="font-bold text-red-400">?</span>
            </div>
            <h2 id="phase-title" class="text-xl text-center font-bold text-yellow-500 mb-4"></h2>
            <div id="player-grid" class="grid grid-cols-1 gap-2"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let myRole = "";

        function join() {
            const name = document.getElementById('username').value;
            if (name) {
                socket.emit('joinGame', name);
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
            }
        }

        function start() {
            socket.emit('startGame');
        }

        socket.on('updatePlayerList', (players) => {
            document.getElementById('list').innerHTML = players.map(p => `• ${p.name}`).join('<br>');
            if (players.length >= 1) document.getElementById('start-btn').classList.remove('hidden');
        });

        socket.on('assignRole', (role) => {
            myRole = role;
            document.getElementById('my-role').innerText = role;
        });

        socket.on('gameStateUpdate', (data) => {
            const title = document.getElementById('phase-title');
            const grid = document.getElementById('player-grid');
            
            // Traduction simple des phases
            const titles = {
                'NIGHT_WEREWOLVES': '🌙 Les Loups choisissent une cible...',
                'NIGHT_SEER': '🔮 La Voyante observe...',
                'NIGHT_WITCH': '🧪 La Sorcière prépare ses potions...',
                'DAY_VOTE': '☀️ Le village débat et vote !'
            };
            
            title.innerText = titles[data.phase] || data.phase;

            // Affichage des joueurs pour interagir
            grid.innerHTML = data.players.map(p => `
                <div class="p-3 bg-slate-700 rounded flex justify-between items-center">
                    <span>${p.name} ${p.alive ? '' : '💀'}</span>
                    ${canAct(data.phase, p) ? `<button class="bg-red-600 text-xs px-2 py-1 rounded">Cibler</button>` : ''}
                </div>
            `).join('');
        });

        function canAct(phase, target) {
            if (phase === 'NIGHT_WEREWOLVES' && myRole === 'Loup-Garou') return true;
            if (phase === 'NIGHT_SEER' && myRole === 'Voyante') return true;
            if (phase === 'DAY_VOTE') return true;
            return false;
        }
    </script>
</body>
</html>
