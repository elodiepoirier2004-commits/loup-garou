<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Loup-Garou Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans p-8">
    <div id="game-container" class="max-w-2xl mx-auto bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center mb-6 text-red-500">🐺 Loup-Garou Online</h1>

        <!-- Ecran d'accueil -->
        <div id="lobby">
            <input id="username" type="text" placeholder="Ton pseudo" class="w-full p-2 rounded bg-slate-700 mb-4 outline-none border border-slate-600 focus:border-red-500">
            <button onclick="join()" class="w-full bg-red-600 hover:bg-red-700 p-3 rounded font-bold transition">Rejoindre la partie</button>
            <div id="player-list" class="mt-6">
                <h3 class="font-semibold mb-2">Joueurs connectés :</h3>
                <ul id="list" class="list-disc pl-5 text-slate-400"></ul>
            </div>
            <button id="start-btn" onclick="start()" class="hidden mt-6 w-full bg-green-600 p-3 rounded font-bold">Lancer la partie</button>
        </div>

        <!-- Ecran de jeu -->
        <div id="game" class="hidden text-center">
            <div id="role-display" class="mb-4 p-4 bg-red-900/30 rounded border border-red-500 text-xl font-bold"></div>
            <div id="status" class="text-lg italic text-blue-300 mb-6">Attente du maître du jeu...</div>
            <div id="action-zone" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let myRole = "";

        function join() {
            const name = document.getElementById('username').value;
            if (name) {
                socket.emit('joinGame', name);
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
            }
        }

        function start() {
            socket.emit('startGame');
        }

        socket.on('updatePlayerList', (players) => {
            const list = document.getElementById('list');
            list.innerHTML = players.map(p => `<li>${p.name}</li>`).join('');
            if (players.length >= 4) document.getElementById('start-btn').classList.remove('hidden');
        });

        socket.on('assignRole', (role) => {
            myRole = role;
            document.getElementById('role-display').innerText = "Ton Rôle : " + role;
        });

        socket.on('gameStateUpdate', (data) => {
            const status = document.getElementById('status');
            status.innerText = "Phase actuelle : " + data.state;
            // Ici, on pourrait ajouter la logique d'affichage des boutons de vote
        });
    </script>
</body>
</html>
